<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AssetFlow - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&amp;family=IBM+Plex+Sans+Condensed:wght@400;600;700&amp;family=IBM+Plex+Mono:wght@400;450;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#89f7d4",
                        "surface-dim": "#111316",
                        "on-secondary": "#003355",
                        "surface-container-highest": "#333538",
                        "on-tertiary": "#00382b",
                        "surface-container-high": "#282a2d",
                        "on-primary-container": "#613b00",
                        "inverse-on-surface": "#2f3034",
                        "surface": "#111316",
                        "secondary": "#9acbff",
                        "inverse-primary": "#865300",
                        "surface-bright": "#37393d",
                        "on-surface": "#e2e2e6",
                        "on-secondary-fixed": "#001d34",
                        "tertiary-container": "#54c4a4",
                        "on-primary": "#472a00",
                        "surface-tint": "#ffb961",
                        "outline": "#a08e7b",
                        "on-error": "#690005",
                        "inverse-surface": "#e2e2e6",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#024a79",
                        "on-tertiary-fixed": "#002118",
                        "primary-container": "#f0a030",
                        "error": "#ffb4ab",
                        "surface-container": "#1e2023",
                        "outline-variant": "#524435",
                        "on-tertiary-container": "#004e3d",
                        "primary": "#ffc176",
                        "surface-container-low": "#1a1c1f",
                        "on-secondary-container": "#87b9ef",
                        "background": "#111316",
                        "tertiary": "#72e0be",
                        "on-tertiary-fixed-variant": "#00513f",
                        "surface-variant": "#333538",
                        "secondary-fixed": "#d0e4ff",
                        "on-background": "#e2e2e6",
                        "primary-fixed-dim": "#ffb961",
                        "on-surface-variant": "#d7c3af",
                        "primary-fixed": "#ffddb8",
                        "on-primary-fixed-variant": "#663e00",
                        "on-primary-fixed": "#2b1700",
                        "secondary-fixed-dim": "#9acbff",
                        "secondary-container": "#024a79",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#6cdab8",
                        "surface-container-lowest": "#0c0e11",
                        "ui-border": "#2C3033",
                        "ui-bg-panel": "#1D2023",
                        "ui-bg-main": "#15171A"
                    },
                    "borderRadius": {
                        "DEFAULT": "4px",
                        "lg": "4px",
                        "xl": "4px",
                        "full": "4px"
                    },
                    "spacing": {
                        "margin-page": "24px",
                        "density-sm": "8px",
                        "density-md": "16px",
                        "unit": "4px",
                        "sidebar-width": "240px",
                        "density-xs": "4px",
                        "gutter-table": "12px"
                    },
                    "fontFamily": {
                        "label-sm": ["IBM Plex Sans Condensed", "sans-serif"],
                        "body-md": ["IBM Plex Sans", "sans-serif"],
                        "headline-md": ["IBM Plex Sans Condensed", "sans-serif"],
                        "headline-lg": ["IBM Plex Sans Condensed", "sans-serif"],
                        "data-mono": ["IBM Plex Mono", "monospace"]
                    },
                    "fontSize": {

                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "data-mono": ["13px", { "lineHeight": "16px", "fontWeight": "450" }]

                }
            }
        }

<style>
        body {
            background-color: #15171A;
            color: #e2e2e6;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .metal-panel {
            background-color: #1D2023;
            border: 1px solid #2C3033;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        .input-technical {
            background-color: #15171A;
            border: 1px solid #2C3033;
            color: #e2e2e6;
            transition: border-color 0.15s ease-in-out;
        }
        .input-technical:focus {
            border-color: #f0a030;
            outline: none;
            box-shadow: none;
        }
        .btn-primary-industrial {
            background-color: #f0a030;
            color: #111316;
            border: none;
        }
        .btn-primary-industrial:hover {
            background-color: #e5982e;
        }
        .btn-secondary-industrial {
            background-color: transparent;
            border: 1px solid #2C3033;
            color: #e2e2e6;
        }
        .btn-secondary-industrial:hover {
            background-color: #25282C;
        }
        
        /* Grid pattern background */
        .bg-grid {
            background-size: 20px 20px;
            background-image: 
                linear-gradient(to right, rgba(44, 48, 51, 0.2) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(44, 48, 51, 0.2) 1px, transparent 1px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-grid font-body-md antialiased p-4">
<main class="w-full max-w-md metal-panel p-6 sm:p-8 relative">
<!-- Corner screws/rivets purely structural implication -->
<div class="absolute top-2 left-2 w-1 h-1 bg-surface-container-highest rounded-full opacity-50"></div>
<div class="absolute top-2 right-2 w-1 h-1 bg-surface-container-highest rounded-full opacity-50"></div>
<div class="absolute bottom-2 left-2 w-1 h-1 bg-surface-container-highest rounded-full opacity-50"></div>
<div class="absolute bottom-2 right-2 w-1 h-1 bg-surface-container-highest rounded-full opacity-50"></div>
<!-- Header / Equipment Label -->
<div class="flex flex-col items-center mb-8 border-b border-ui-border pb-6">
<div class="flex items-center justify-center w-12 h-12 bg-primary-container text-on-primary-container font-data-mono text-headline-lg font-bold mb-4">
                AF
            </div>
<h1 class="font-headline-lg text-on-surface uppercase tracking-wider text-center">AssetFlow System</h1>
<p class="font-data-mono text-data-mono text-on-surface-variant mt-2 text-center uppercase">Auth_Module_V2.1</p>
</div>
<div class="space-y-6" id="login-view">
<form class="space-y-4">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-[14px]">terminal</span>
                        Operator ID (Email)
                    </label>
<div class="relative">
<input class="w-full input-technical font-data-mono text-data-mono p-3 rounded-none placeholder-surface-variant" id="email" placeholder="user@assetflow.inc" required="" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[14px]">lock</span>
                            Security Key
                        </label>
<a class="font-data-mono text-[10px] text-surface-variant hover:text-on-surface-variant transition-colors underline" href="#">Forgot key?</a>
</div>
<div class="relative">
<input class="w-full input-technical font-data-mono text-data-mono p-3 rounded-none placeholder-surface-variant" id="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Password Strength Segmented Bar (Active on typying ideally, static here for UI) -->
<div class="flex gap-1 h-1 mt-2">
<div class="flex-1 bg-error"></div>
<div class="flex-1 bg-primary-container"></div>
<div class="flex-1 bg-surface-container-highest"></div>
<div class="flex-1 bg-surface-container-highest"></div>
</div>
<p class="font-data-mono text-[10px] text-primary-container mt-1">Strength: Moderate</p>
</div>
<div class="pt-4">
<button class="w-full btn-primary-industrial font-headline-md text-headline-md uppercase tracking-wider py-3 flex items-center justify-center gap-2" type="submit">
                        Initialize Session
                        <span class="material-symbols-outlined text-[18px]">login</span>
</button>
</div>
</form>
<div class="border-t border-ui-border pt-6 mt-6">
<button class="w-full btn-secondary-industrial font-label-sm text-label-sm uppercase tracking-widest py-3 flex items-center justify-center gap-2" id="toggle-signup" type="button">
                    Request New Access Credential
                    <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
</button>
<div class="bg-surface p-3 mt-4 border border-ui-border flex items-start gap-3">
<span class="material-symbols-outlined text-[16px] text-outline mt-0.5">info</span>
<p class="font-data-mono text-[11px] text-on-surface-variant leading-relaxed">
                        Note: New registrations create Employee accounts. Role assignment is handled via Admin flow.
                     </p>
</div>
</div>
</div>
</main>
<script>
        // Minimal interaction logic
        document.getElementById('password').addEventListener('input', function(e) {
            const val = e.target.value;
            const segments = document.querySelectorAll('.flex.gap-1.h-1 > div');
            const statusText = document.querySelector('.flex.gap-1.h-1 + p');
            
            // Reset all
            segments.forEach(seg => {
                seg.className = 'flex-1 bg-surface-container-highest';
            });

            if (val.length === 0) {
                statusText.textContent = "Strength: None";
                statusText.className = "font-data-mono text-[10px] text-surface-variant mt-1";
            } else if (val.length < 5) {
                segments[0].className = 'flex-1 bg-error';
                statusText.textContent = "Strength: Weak";
                statusText.className = "font-data-mono text-[10px] text-error mt-1";
            } else if (val.length < 8) {
                segments[0].className = 'flex-1 bg-error';
                segments[1].className = 'flex-1 bg-primary-container';
                statusText.textContent = "Strength: Moderate";
                statusText.className = "font-data-mono text-[10px] text-primary-container mt-1";
            } else if (val.length < 12) {
                segments[0].className = 'flex-1 bg-error';
                segments[1].className = 'flex-1 bg-primary-container';
                segments[2].className = 'flex-1 bg-tertiary-container';
                statusText.textContent = "Strength: Strong";
                statusText.className = "font-data-mono text-[10px] text-tertiary-container mt-1";
            } else {
                 segments[0].className = 'flex-1 bg-tertiary-container';
                 segments[1].className = 'flex-1 bg-tertiary-container';
                 segments[2].className = 'flex-1 bg-tertiary-container';
                 segments[3].className = 'flex-1 bg-tertiary-container';
                 statusText.textContent = "Strength: Optimal";
                 statusText.className = "font-data-mono text-[10px] text-tertiary-container mt-1";
            }
        });
    </script>
</body></html>
